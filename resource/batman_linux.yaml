# Batman rules for a Linux host.
logPath: /var/log/batman.log

email_server_host: localhost
email_server_port: 25
email_from_address: scanner@localhost
report_on_success: false
report_to: root@localhost

file_integrity:
  # 0 means scan the whole file. Set a byte count to cap reads for faster but
  # weaker scans.
  scan_byte_limit: 0
  # Optional. Defaults to min(available CPU count minus two, 4), minimum one.
  # scan_threads: 4
  # Optional. Checksum read buffer per worker, in bytes.
  # scan_buffer_size: 65536
  # Optional. Ed25519 public key for verifying signed baseline manifests.
  # baseline_public_key: <public-key>
  db_path: /data/baseline

  scan_paths:
    - /

  exclusions:
    - /dev
    - /proc
    - /run
    # /snap is a read-only expanded view of loop-mounted SquashFS package
    # images. The backing .snap files under /var/lib/snapd/snaps remain covered.
    - /snap
    - /sys
    - /tmp
    - /var/cache
    - /var/lib/batman
    - /var/lib/containers
    - /var/lib/kubelet
    - /var/log

  # Mounted filesystem types to skip when reached through a scan path. This
  # avoids virtual/kernel filesystems and expanded read-only snap images.
  excluded_filesystems:
    - autofs
    - bpf
    - cgroup
    - cgroup2
    - configfs
    - debugfs
    - devpts
    - devtmpfs
    - efivarfs
    - fuse.gvfsd-fuse
    - fuse.portal
    - mqueue
    - proc
    - pstore
    - securityfs
    - squashfs
    - sysfs
    - tracefs

  # Metadata-only rules:
  #   /path/  checks the directory entry itself, not its contents.
  #   /path/* checks everything under the directory without hashing content.
  metadata_only:
    - /run/
    - /snap/
    - /tmp/
    - /var/cache/
    - /var/lib/containers/
    - /var/lib/kubelet/
    - /var/log/
