# Batman rules for a Windows host.
logPath: C:\ProgramData\Batman\batman.log

email_server_host: localhost
email_server_port: 25
email_from_address: scanner@localhost
report_on_success: false
report_to: root@localhost

file_integrity:
  scan_byte_limit: 0
  # Optional. Defaults to min(available CPU count minus two, 4), minimum one.
  # scan_threads: 4
  # Optional. Checksum read buffer per worker, in bytes.
  # scan_buffer_size: 65536
  # Optional. Ed25519 public key for verifying signed baseline manifests.
  # baseline_public_key: <public-key>
  db_path: C:\ProgramData\Batman\baseline

  scan_paths:
    - C:\

  exclusions:
    - C:\ProgramData\Batman
    - C:\Windows\Temp
    - C:\Windows\Prefetch
    - C:\Windows\SoftwareDistribution

  # Metadata-only rules:
  #   C:/path/  checks the directory entry itself, not its contents.
  #   C:/path/* checks everything under the directory without hashing content.
  metadata_only:
    - C:/ProgramData/Batman/
    - C:/Windows/Temp/
    - C:/Windows/Prefetch/
    - C:/Windows/SoftwareDistribution/

  # Windows registry keys to baseline recursively. Entries are stored as
  # synthetic registry:// records and reviewed through the normal scan flow.
  registry_paths:
    - HKLM\Software\Microsoft\Windows\CurrentVersion\Run
    - HKLM\Software\Microsoft\Windows\CurrentVersion\RunOnce
    - HKLM\System\CurrentControlSet\Services
